<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Memories Coming Soon</title>

<style>

body{

  margin:0;

  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  background:black;

  color:white;

  font-family:sans-serif;

  overflow:hidden;
}

h1{

  font-size:2rem;

  margin-bottom:10px;

  animation: fade 2s infinite alternate;
}

p{

  opacity:0.7;

  font-size:1rem;
}

@keyframes fade{

  from{
    opacity:0.5;
    transform:scale(1);
  }

  to{
    opacity:1;
    transform:scale(1.03);
  }

}

</style>

</head>

<body>

<h1>Memories Coming Soon ✨</h1>

<p>Stay tuned for the unforgettable moments.</p>
