<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no"
  />

  <title>Farewell Memory AR</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      touch-action: none;
      font-family: sans-serif;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      font-size: 18px;
    }

    #foundMessage {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      z-index: 999;
      display: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="loading">
  Point your camera at the memory photo 📸
</div>

<div id="foundMessage">
  Memory Found ✨
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./assets/targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
  "
  color-space="sRGB"
  embedded
  renderer="
    colorManagement: true,
    physicallyCorrectLights
  "
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>

    <video
      id="memoryVideo"
      src="./assets/memory.mp4"
      preload="auto"
      response-type="arraybuffer"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <!-- IMAGE TARGET -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-video
      id="videoPlane"
      src="#memoryVideo"
      width="1"
      height="1.4"
      position="0 0 0"
      rotation="0 0 0"
    ></a-video>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.querySelector("#memoryVideo");

  const target = document.querySelector(
    '[mindar-image-target]'
  );

  const loading = document.getElementById("loading");

  const foundMessage =
    document.getElementById("foundMessage");

  // TARGET FOUND
  target.addEventListener("targetFound", async () => {

    loading.style.display = "none";

    foundMessage.style.display = "block";

    try {
      await video.play();
    } catch(e) {
      console.log(e);
    }

  });

  // TARGET LOST
  target.addEventListener("targetLost", () => {

    foundMessage.style.display = "none";

    video.pause();

  });

});
</script>

</body>
</html>
