<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Farewell Memory AR</title>

  <link rel="stylesheet" href="style.css">
  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
</head>

<body>

<div id="loading">
  Point camera at the memory photo 📸
</div>

<a
  id="reliveButton"
  href="./Commingsoon.html"
  target="_blank"
>
  Relive More ✨
</a>

<div id="tapHint">
  👇 Tap Here
</div>

<button
  id="arPlayOverlay"
  type="button"
  aria-label="Play memory video"
>
  <span></span>
</button>

<div
  id="arVideoControls"
  aria-label="AR video controls"
>
  <div class="ar-control-top">
    <button
      class="ar-control-btn"
      id="back10"
      type="button"
      aria-label="Back 10 seconds"
    >
      -10
    </button>

    <button
      class="ar-control-btn ar-play-btn"
      id="playPause"
      type="button"
      aria-label="Play"
    >
      <span id="playPauseIcon">&#9654;</span>
    </button>

    <button
      class="ar-control-btn"
      id="forward10"
      type="button"
      aria-label="Forward 10 seconds"
    >
      +10
    </button>

    <button
      class="ar-control-btn"
      id="muteToggle"
      type="button"
      aria-label="Mute"
    >
      <span id="muteIcon">&#128266;</span>
    </button>

    <div
      id="bufferSpinner"
      aria-label="Buffering video"
    ></div>
  </div>

  <div class="ar-progress-row">
    <span id="currentTime">0:00</span>

    <input
      id="videoProgress"
      type="range"
      min="0"
      max="100"
      value="0"
      step="0.1"
      aria-label="Seek video"
    />

    <span id="durationTime">0:00</span>
  </div>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./assets/targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
  "

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    alpha: true;
    antialias: true
  "

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"
>

  <a-assets>

    <video
      id="memoryVideo"
      src="./assets/memory.mp4"

      preload="auto"

      muted

      playsinline

      webkit-playsinline

      crossorigin="anonymous"

      loop
    ></video>

  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <!-- TARGET -->

  <a-entity mindar-image-target="targetIndex: 0">

    <a-plane
      id="videoPlane"

      width="1"

      height="1.05"

      position="0 0 0"

      visible="false"

      material="
        shader: flat;
        src: #memoryVideo;
        side: double;
      "
    ></a-plane>

  </a-entity>

</a-scene>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const video =
    document.querySelector("#memoryVideo");

  const videoPlane =
    document.querySelector("#videoPlane");

  const target =
    document.querySelector('[mindar-image-target]');

  const loading =
    document.getElementById("loading");

  const reliveButton =
    document.getElementById("reliveButton");

  const tapHint =
    document.getElementById("tapHint");

  const controls =
    document.getElementById("arVideoControls");

  const playOverlay =
    document.getElementById("arPlayOverlay");

  const playPause =
    document.getElementById("playPause");

  const playPauseIcon =
    document.getElementById("playPauseIcon");

  const back10 =
    document.getElementById("back10");

  const forward10 =
    document.getElementById("forward10");

  const muteToggle =
    document.getElementById("muteToggle");

  const muteIcon =
    document.getElementById("muteIcon");

  const progress =
    document.getElementById("videoProgress");

  const currentTime =
    document.getElementById("currentTime");

  const durationTime =
    document.getElementById("durationTime");

  const bufferSpinner =
    document.getElementById("bufferSpinner");

  let hasStarted = false;
  let isTargetVisible = false;
  let isSeeking = false;
  let progressFrame = null;

  const HAVE_CURRENT_DATA = 2;

  const formatTime = (seconds) => {

    if(!Number.isFinite(seconds) || seconds < 0) return "0:00";

    const totalSeconds = Math.floor(seconds);
    const minutes = Math.floor(totalSeconds / 60);
    const remainingSeconds = totalSeconds % 60;

    return `${minutes}:${String(remainingSeconds).padStart(2, "0")}`;

  };

  const showBuffering = (show) => {

    bufferSpinner.style.display = show ? "block" : "none";

  };

  const updatePlayIcon = () => {

    const isPlaying = !video.paused && !video.ended;

    playPauseIcon.innerHTML = isPlaying ? "&#10074;&#10074;" : "&#9654;";
    playPause.setAttribute("aria-label", isPlaying ? "Pause" : "Play");

  };

  const updateMuteIcon = () => {

    muteIcon.innerHTML = video.muted ? "&#128263;" : "&#128266;";
    muteToggle.setAttribute("aria-label", video.muted ? "Unmute" : "Mute");

  };

  const updateProgress = () => {

    const duration = video.duration || 0;
    const percent = duration ? (video.currentTime / duration) * 100 : 0;

    if(!isSeeking) {

      progress.value = percent;

    }

    progress.style.setProperty("--progress", `${percent}%`);
    currentTime.textContent = formatTime(video.currentTime);
    durationTime.textContent = formatTime(duration);

  };

  const startProgressLoop = () => {

    if(progressFrame) return;

    const tick = () => {

      updateProgress();

      if(isTargetVisible && !video.paused && !video.ended) {

        progressFrame = requestAnimationFrame(tick);

      }

      else {

        progressFrame = null;

      }

    };

    progressFrame = requestAnimationFrame(tick);

  };

  const stopProgressLoop = () => {

    if(progressFrame) {

      cancelAnimationFrame(progressFrame);
      progressFrame = null;

    }

  };

  const animateTap = (button) => {

    button.classList.add("is-tapping");

    setTimeout(() => {

      button.classList.remove("is-tapping");

    }, 160);

  };

  const seekBy = (seconds) => {

    if(!Number.isFinite(video.duration)) return;

    video.currentTime =
      Math.min(Math.max(video.currentTime + seconds, 0), video.duration);

    updateProgress();

  };

  const waitForVideoFrame = () => {

    if(video.readyState >= HAVE_CURRENT_DATA) {

      return Promise.resolve();

    }

    return new Promise((resolve, reject) => {

      const timeout = setTimeout(() => {

        cleanup();
        reject(new Error("Timed out waiting for a playable video frame."));

      }, 8000);

      const cleanup = () => {

        clearTimeout(timeout);
        video.removeEventListener("loadeddata", handleReady);
        video.removeEventListener("canplay", handleReady);
        video.removeEventListener("error", handleError);

      };

      const handleReady = () => {

        cleanup();
        resolve();

      };

      const handleError = () => {

        cleanup();
        reject(video.error || new Error("Video failed to load."));

      };

      video.addEventListener("loadeddata", handleReady, { once: true });
      video.addEventListener("canplay", handleReady, { once: true });
      video.addEventListener("error", handleError, { once: true });

      video.load();

    });

  };

  const attemptPlay = async () => {

    if(!isTargetVisible) return;

    try {

      showBuffering(true);

      await waitForVideoFrame();

      if(!isTargetVisible) return;

      videoPlane.setAttribute("visible", "true");

      await video.play();

      hasStarted = true;

      playOverlay.style.display = "none";

      showBuffering(false);

      updatePlayIcon();

      startProgressLoop();

    }

    catch(err) {

      console.log("Unable to play AR video:", err, video.error);

      playOverlay.style.display = "flex";

      showBuffering(false);

      updatePlayIcon();

    }

  };

  video.addEventListener("loadedmetadata", updateProgress);

  video.addEventListener("timeupdate", updateProgress);

  video.addEventListener("waiting", () => {

    if(isTargetVisible) showBuffering(true);

  });

  video.addEventListener("seeking", () => {

    if(isTargetVisible) showBuffering(true);

  });

  video.addEventListener("seeked", () => {

    showBuffering(false);
    updateProgress();

  });

  video.addEventListener("playing", () => {

    showBuffering(false);
    playOverlay.style.display = "none";
    updatePlayIcon();
    startProgressLoop();

  });

  video.addEventListener("canplay", () => {

    showBuffering(false);

  });

  video.addEventListener("error", () => {

    console.log("Video load error:", video.error);
    showBuffering(false);
    playOverlay.style.display = "flex";

  });

  video.addEventListener("pause", () => {

    updatePlayIcon();
    stopProgressLoop();

  });

  video.addEventListener("ended", () => {

    updatePlayIcon();
    stopProgressLoop();

  });

  playPause.addEventListener("click", () => {

    animateTap(playPause);

    if(video.paused || video.ended) {

      attemptPlay();

    }

    else {

      video.pause();

    }

  });

  playOverlay.addEventListener("click", () => {

    animateTap(playOverlay);

    attemptPlay();

  });

  back10.addEventListener("click", () => {

    animateTap(back10);

    seekBy(-10);

  });

  forward10.addEventListener("click", () => {

    animateTap(forward10);

    seekBy(10);

  });

  muteToggle.addEventListener("click", () => {

    animateTap(muteToggle);

    video.muted = !video.muted;

    updateMuteIcon();

  });

  progress.addEventListener("input", () => {

    const value = Number(progress.value);

    progress.style.setProperty("--progress", `${value}%`);

    if(Number.isFinite(video.duration)) {

      video.currentTime = (value / 100) * video.duration;
      currentTime.textContent = formatTime(video.currentTime);

    }

  });

  progress.addEventListener("pointerdown", () => {

    isSeeking = true;

  });

  progress.addEventListener("pointerup", () => {

    isSeeking = false;
    updateProgress();

  });

  progress.addEventListener("change", () => {

    isSeeking = false;
    updateProgress();

  });

  updatePlayIcon();
  updateMuteIcon();
  updateProgress();

  // TARGET FOUND
  target.addEventListener("targetFound", async () => {

    isTargetVisible = true;

    loading.style.display = "none";

    reliveButton.style.display = "block";

    tapHint.style.display = "block";

    controls.style.display = "flex";

    showBuffering(true);

    videoPlane.setAttribute("visible", "false");

    if(!hasStarted) {

      video.pause();

      video.currentTime = 0;

    }

    updateMuteIcon();
    updateProgress();

    attemptPlay();

  });

  // TARGET LOST
  target.addEventListener("targetLost", () => {

    isTargetVisible = false;

    reliveButton.style.display = "none";

    tapHint.style.display = "none";

    controls.style.display = "none";

    playOverlay.style.display = "none";

    videoPlane.setAttribute("visible", "false");

    showBuffering(false);

    video.pause();

    hasStarted = false;

    stopProgressLoop();

  });

});
</script>

</body>
</html>
