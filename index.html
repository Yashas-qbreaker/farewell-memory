<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  />

  <title>Farewell Memory AR</title>

  <link rel="stylesheet" href="style.css">
  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

<div id="loading">
  Point camera at the memory photo 📸
</div>

<a
  id="reliveButton"
  href="https://drive.google.com/drive/folders/1KH-MVIvbtGKiEzghq10CbXSNoX52BpSK"
  target="_blank"
>
  Relive More ✨
</a>

<div id="tapHint">
  👇 Tap Here
</div>

<div id="videoControls" aria-label="Video controls">
  <button id="playPauseButton" type="button" aria-label="Pause video">
    Pause
  </button>

  <input
    id="videoSeek"
    type="range"
    min="0"
    max="100"
    value="0"
    step="0.1"
    aria-label="Video progress"
  />

  <button id="muteButton" type="button" aria-label="Mute video">
    Mute
  </button>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./assets/targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
  "

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    alpha: true;
    antialias: true
  "

  color-space="sRGB"

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"
>

  <a-assets>

    <video
      id="memoryVideo"
      src="./assets/memory1.mp4"

      preload="auto"

      playsinline

      webkit-playsinline

      crossorigin="anonymous"

      loop
    ></video>

  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <!-- TARGET -->

  <a-entity mindar-image-target="targetIndex: 0">

    <a-video
      id="videoPlane"

      src="#memoryVideo"

      width="1"

      height="1.05"

      position="0 0 0"

      material="shader: flat;"
    ></a-video>

  </a-entity>

</a-scene>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const video =
    document.querySelector("#memoryVideo");

  const target =
    document.querySelector('[mindar-image-target]');

  const loading =
    document.getElementById("loading");

  const reliveButton =
    document.getElementById("reliveButton");

  const tapHint =
    document.getElementById("tapHint");

  const videoControls =
    document.getElementById("videoControls");

  const playPauseButton =
    document.getElementById("playPauseButton");

  const muteButton =
    document.getElementById("muteButton");

  const videoSeek =
    document.getElementById("videoSeek");

  let hasStarted = false;
  let isSeeking = false;

  const syncPlayButton = () => {
    playPauseButton.textContent = video.paused ? "Play" : "Pause";
    playPauseButton.setAttribute(
      "aria-label",
      video.paused ? "Play video" : "Pause video"
    );
  };

  const syncMuteButton = () => {
    muteButton.textContent = video.muted ? "Unmute" : "Mute";
    muteButton.setAttribute(
      "aria-label",
      video.muted ? "Unmute video" : "Mute video"
    );
  };

  const syncSeek = () => {
    if(isSeeking || !video.duration) return;

    videoSeek.value =
      (video.currentTime / video.duration) * 100;
  };

  video.addEventListener("play", syncPlayButton);
  video.addEventListener("pause", syncPlayButton);
  video.addEventListener("volumechange", syncMuteButton);
  video.addEventListener("timeupdate", syncSeek);
  video.addEventListener("loadedmetadata", syncSeek);

  playPauseButton.addEventListener("click", async () => {
    if(video.paused) {
      await video.play();
    }
    else {
      video.pause();
    }
  });

  muteButton.addEventListener("click", () => {
    video.muted = !video.muted;
  });

  videoSeek.addEventListener("input", () => {
    isSeeking = true;
  });

  videoSeek.addEventListener("change", () => {
    if(video.duration) {
      video.currentTime =
        (Number(videoSeek.value) / 100) * video.duration;
    }

    isSeeking = false;
  });

  // TARGET FOUND
  target.addEventListener("targetFound", async () => {

    loading.style.display = "none";

    reliveButton.style.display = "block";

    tapHint.style.display = "block";

    videoControls.style.display = "flex";

    if(hasStarted) return;

    try {

      // wait for enough video data
      await video.play();

      video.pause();

      video.currentTime = 0;

      // small delay helps older phones
      setTimeout(async () => {

        video.muted = false;

        video.volume = 1;

        await video.play();

        hasStarted = true;

      }, 300);

    }

    catch(err) {

      console.log(err);

    }

  });

  // TARGET LOST
  target.addEventListener("targetLost", () => {

    reliveButton.style.display = "none";

    tapHint.style.display = "none";

    videoControls.style.display = "none";

    video.pause();

    hasStarted = false;

  });

});
</script>

</body>
</html>
