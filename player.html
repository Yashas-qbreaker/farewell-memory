<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Farewell Memories</title>

<style>

body{
  margin:0;
  background: radial-gradient(circle at top, rgba(30,144,255,0.14), transparent 30%), #111;

  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding: 24px;
  box-sizing: border-box;
  font-family:sans-serif;
}

.polaroid{

  width:420px;
  max-width:100%;
  background:white;
  padding:24px;
  box-sizing:border-box;
  border-radius:26px;
  box-shadow:
    0 20px 40px rgba(0,0,0,.35);
}

.video-frame{

  width:100%;

  aspect-ratio:1/1;

  overflow:hidden;

  background:black;
}

.video-frame video{

  width:100%;
  height:100%;

  object-fit:cover;

  display:block;
}

.video-frame{
  border-radius:20px;
  overflow:hidden;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
}

.controls{

  margin-top:20px;

  display:flex;
  flex-direction:column;

  gap:12px;
}

.buttons{

  display:flex;

  justify-content:center;

  gap:15px;
}

.buttons button{

  border:none;

  background:#1e88e5;

  color:white;

  padding:12px 18px;

  border-radius:12px;

  font-size:16px;

  min-width: 96px;

  cursor:pointer;
}

.buttons button:active{
  transform: scale(.96);
}

#progress{

  width:100%;
}

.time{

  text-align:center;

  color:#444;

  font-size:14px;
}

@media(max-width:500px){

  .polaroid{

    width:92vw;
  }

}

#reliveMore{
  display:block;
  width:fit-content;
  margin:18px auto 0;
  background:#1e88e5;
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:14px;
}

#buffering{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 18px;
  z-index: 10000;
  text-align: center;
  display: none;
}

#buffering div:first-child{
  animation: spin 1s linear infinite;
  font-size: 32px;
}

#buffering div:last-child{
  margin-top: 12px;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>

</head>

<body>

<div id="buffering">
  <div>⟳</div>
  <div>Buffering memory...</div>
</div>

<div class="polaroid">

  <div class="video-frame">

    <video
      id="video"
      autoplay
      muted
      preload="metadata"
    >
      <source src="./assets/memory1.mp4" type="video/mp4">
    </video>

  </div>

  <div class="controls">

    <input
      type="range"
      id="progress"
      value="0"
      min="0"
      max="100"
    >

    <div class="buttons">

      <button id="back">
        ⏪ 10s
      </button>

      <button id="play">
        ▶️
      </button>

      <button id="forward">
        ⏩ 10s
      </button>

    </div>

    <div class="time">
      <span id="current">0:00</span>
      /
      <span id="duration">0:00</span>
    </div>

  </div>

</div>

<script>

const video =
  document.getElementById("video");

const buffering =
  document.getElementById("buffering");

const playBtn =
  document.getElementById("play");

const progress =
  document.getElementById("progress");

const current =
  document.getElementById("current");

const duration =
  document.getElementById("duration");

// Show buffering when video starts loading
video.addEventListener("loadstart", () => {
  buffering.style.display = "block";
});

// Hide buffering when video has enough data
video.addEventListener("canplay", () => {
  buffering.style.display = "none";
});

// Show buffering if video needs to buffer
video.addEventListener("waiting", () => {
  buffering.style.display = "block";
});

// Hide buffering on play
video.addEventListener("playing", () => {
  buffering.style.display = "none";
});

document
.getElementById("back")
.onclick = () => {

  video.currentTime =
    Math.max(0, video.currentTime - 10);

};

document
.getElementById("forward")
.onclick = () => {

  video.currentTime =
    Math.min(
      video.duration,
      video.currentTime + 10
    );

};

playBtn.onclick = async () => {

  if(video.paused){

    await video.play();

    playBtn.innerHTML = "⏸️";

  }else{

    video.pause();

    playBtn.innerHTML = "▶️";
  }

};

video.addEventListener(
  "loadedmetadata",
  async () => {

    duration.textContent =
      format(video.duration);

    setTimeout(() => {
      video.muted = false;
    }, 300);

  }
);

video.addEventListener(
  "timeupdate",
  () => {

    const percent =
      (video.currentTime /
      video.duration) * 100;

    progress.value = percent;

    current.textContent =
      format(video.currentTime);

  }
);

progress.addEventListener(
  "input",
  () => {

    video.currentTime =
      (progress.value / 100) *
      video.duration;

  }
);

video.addEventListener(
  "loadedmetadata",
  async () => {

    try{

      await video.play();

      playBtn.innerHTML="⏸️";

    }catch(e){}

  }
);

function format(sec){

  const m =
    Math.floor(sec / 60);

  const s =
    Math.floor(sec % 60);

  return `${m}:${s
    .toString()
    .padStart(2,"0")}`;
}

</script>

<a
  id="reliveMore"
  href="./Commingsoon.html"
>
  Relive More ✨
</a>

</body>
</html>
