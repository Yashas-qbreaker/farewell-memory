<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101214" />
  <title>Farewell Memory Player</title>
  <style>
    :root {
      --page-bg: #101214;
      --paper: #fffefa;
      --paper-soft: #f8f4ec;
      --ink: #161b22;
      --muted: #687383;
      --blue: #1688ff;
      --blue-dark: #0f65c5;
      --track: rgba(22, 136, 255, 0.16);
      --shadow: 0 24px 58px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101214;
      overflow-x: hidden;
    }

    main {
      width: min(90vw, 500px);
      display: flex;
      justify-content: center;
    }

    .polaroid {
      width: 100%;
      padding: clamp(18px, 5vw, 28px) clamp(18px, 5vw, 28px) clamp(20px, 5.8vw, 34px);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-soft) 100%);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(20, 20, 20, 0.035);
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1.05;
      overflow: hidden;
      border-radius: 12px;
      background: #0a1322;
      box-shadow: 0 10px 20px rgba(18, 24, 32, 0.18);
      isolation: isolate;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
      background: #0a1322;
    }

    .loader,
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 180ms ease, visibility 180ms ease;
      z-index: 3;
    }

    .loader {
      flex-direction: column;
      gap: 10px;
      color: white;
      background: rgba(5, 8, 12, 0.44);
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.45);
    }

    .loader.is-hidden,
    .play-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.28);
      border-top-color: #ffffff;
      animation: spin 850ms linear infinite;
    }

    .loader-text {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .play-overlay {
      background: linear-gradient(180deg, rgba(5, 10, 19, 0.06), rgba(5, 10, 19, 0.36));
      pointer-events: none;
    }

    .play-overlay:not(.is-hidden) {
      pointer-events: auto;
    }

    .big-play {
      width: 68px;
      height: 68px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 50%;
      color: white;
      background: rgba(22, 136, 255, 0.72);
      box-shadow: 0 14px 32px rgba(22, 136, 255, 0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      transform: translateZ(0);
      transition: transform 170ms ease, background 170ms ease, box-shadow 170ms ease;
    }

    .big-play::before {
      content: "";
      display: block;
      width: 0;
      height: 0;
      margin: auto;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid currentColor;
      transform: translateX(4px);
    }

    .big-play:active {
      transform: scale(0.94);
    }

    .caption {
      padding: clamp(16px, 4vw, 22px) 4px 0;
      text-align: center;
    }

    .caption-title {
      margin: 0 0 10px;
      color: #111820;
      font-family: "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive;
      font-size: clamp(1.18rem, 5.2vw, 1.7rem);
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1.05;
    }

    .controls {
      display: grid;
      gap: 9px;
      padding: 10px 10px 11px;
      border: 1px solid rgba(22, 136, 255, 0.16);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(22, 136, 255, 0.075), rgba(22, 136, 255, 0.035));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .control-button {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(22, 136, 255, 0.22);
      border-radius: 999px;
      color: var(--blue-dark);
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 5px 12px rgba(15, 101, 197, 0.12);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .control-button.primary {
      width: 40px;
      height: 40px;
      color: #ffffff;
      background: linear-gradient(145deg, var(--blue), var(--blue-dark));
      border-color: rgba(255, 255, 255, 0.55);
    }

    .control-button:hover {
      background: rgba(22, 136, 255, 0.12);
      box-shadow: 0 7px 14px rgba(15, 101, 197, 0.16);
    }

    .control-button.primary:hover {
      background: linear-gradient(145deg, #2995ff, var(--blue-dark));
    }

    .control-button:active,
    .control-button.is-tapping {
      transform: scale(0.92);
    }

    .control-button svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .control-button.primary svg {
      width: 22px;
      height: 22px;
    }

    .seek-wrap {
      display: grid;
      gap: 4px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      height: 18px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
      touch-action: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue) var(--progress, 0%), var(--track) var(--progress, 0%));
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: var(--track);
    }

    input[type="range"]::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: var(--blue);
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      margin-top: -5px;
      border: 2px solid white;
      border-radius: 50%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--blue);
      box-shadow: 0 4px 10px rgba(15, 101, 197, 0.28);
    }

    input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border: 2px solid white;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 4px 10px rgba(15, 101, 197, 0.28);
    }

    .relive-more {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(76vw, 350px);
      min-height: 46px;
      border: 1px solid rgba(22, 136, 255, 0.36);
      border-radius: 999px;
      color: white;
      background: linear-gradient(145deg, var(--blue), var(--blue-dark));
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28), 0 8px 18px rgba(15, 101, 197, 0.2);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 150ms ease, filter 150ms ease, box-shadow 150ms ease;
    }

    .relive-more:hover {
      filter: brightness(1.04);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3), 0 10px 20px rgba(15, 101, 197, 0.24);
    }

    .relive-more:active {
      transform: scale(0.97);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 420px) {
      body {
        gap: 16px;
        padding-left: 10px;
        padding-right: 10px;
      }

      .polaroid {
        padding: 18px 18px 22px;
        border-radius: 7px;
      }

      .controls {
        padding: 9px 9px 10px;
      }

      .button-row {
        gap: 8px;
      }

      .control-button {
        width: 35px;
        height: 35px;
      }

      .control-button.primary {
        width: 39px;
        height: 39px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Full farewell memory video">
    <article class="polaroid" aria-label="Farewell memory card">
      <section class="video-shell" aria-label="Memory video">
        <video
          id="memoryVideo"
          src="./assets/memory1.mp4"
          autoplay
          preload="auto"
          playsinline
          webkit-playsinline
        ></video>

        <div class="loader" id="loader" role="status" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loader-text">Loading Memories...</p>
        </div>

        <div class="play-overlay is-hidden" id="playOverlay">
          <button class="big-play" id="bigPlayButton" type="button" aria-label="Play memory video"></button>
        </div>
      </section>

      <section class="caption" aria-label="Video controls">
        <h1 class="caption-title">Farewell memories</h1>

        <div class="controls">
          <div class="button-row">
            <button class="control-button" id="backButton" type="button" aria-label="Back 10 seconds">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6.8V3L4.7 8.2 11 13.4V9.6c4.1.1 6.9 2.4 6.9 5.8 0 1.7-.7 3.3-1.9 4.6h2.7c.9-1.4 1.3-2.9 1.3-4.6 0-4.7-3.7-8.4-9-8.6Z"></path>
                <path d="M8.2 16.9h1.1v-4.8H8.1l-1.3.9.5.8.9-.6v3.7Zm3.9.1c1.4 0 2.2-.9 2.2-2.5s-.8-2.5-2.2-2.5-2.2.9-2.2 2.5.8 2.5 2.2 2.5Zm0-1c-.7 0-1-.5-1-1.5s.3-1.5 1-1.5 1 .5 1 1.5-.3 1.5-1 1.5Z"></path>
              </svg>
            </button>

            <button class="control-button primary" id="playButton" type="button" aria-label="Play">
              <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5.2v13.6L18.8 12 8 5.2Z"></path>
              </svg>
            </button>

            <button class="control-button" id="forwardButton" type="button" aria-label="Forward 10 seconds">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13 6.8V3l6.3 5.2L13 13.4V9.6c-4.1.1-6.9 2.4-6.9 5.8 0 1.7.7 3.3 1.9 4.6H5.3C4.4 18.6 4 17.1 4 15.4c0-4.7 3.7-8.4 9-8.6Z"></path>
                <path d="M9.2 16.9h1.1v-4.8H9.1l-1.3.9.5.8.9-.6v3.7Zm3.9.1c1.4 0 2.2-.9 2.2-2.5s-.8-2.5-2.2-2.5-2.2.9-2.2 2.5.8 2.5 2.2 2.5Zm0-1c-.7 0-1-.5-1-1.5s.3-1.5 1-1.5 1 .5 1 1.5-.3 1.5-1 1.5Z"></path>
              </svg>
            </button>
          </div>

          <div class="seek-wrap">
            <input id="seekSlider" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek through video" />
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>
        </div>
      </section>
    </article>
  </main>

  <a class="relive-more" href="./Commingsoon.html">Relive More &#10024;</a>

  <script>
    (() => {
      const video = document.getElementById("memoryVideo");
      const loader = document.getElementById("loader");
      const playOverlay = document.getElementById("playOverlay");
      const bigPlayButton = document.getElementById("bigPlayButton");
      const playButton = document.getElementById("playButton");
      const playIcon = document.getElementById("playIcon");
      const backButton = document.getElementById("backButton");
      const forwardButton = document.getElementById("forwardButton");
      const seekSlider = document.getElementById("seekSlider");
      const currentTime = document.getElementById("currentTime");
      const duration = document.getElementById("duration");

      let isSeeking = false;
      let hasMetadata = false;

      const playPath = '<path d="M8 5.2v13.6L18.8 12 8 5.2Z"></path>';
      const pausePath = '<path d="M7 5h3.5v14H7V5Zm6.5 0H17v14h-3.5V5Z"></path>';

      const formatTime = (seconds) => {
        if (!Number.isFinite(seconds) || seconds < 0) return "0:00";

        const totalSeconds = Math.floor(seconds);
        const minutes = Math.floor(totalSeconds / 60);
        const remainingSeconds = totalSeconds % 60;

        return `${minutes}:${String(remainingSeconds).padStart(2, "0")}`;
      };

      const setLoading = (loading) => {
        loader.classList.toggle("is-hidden", !loading);
      };

      const setOverlay = (visible) => {
        playOverlay.classList.toggle("is-hidden", !visible);
      };

      const updatePlayButton = () => {
        const isPlaying = !video.paused && !video.ended;
        playButton.setAttribute("aria-label", isPlaying ? "Pause" : "Play");
        playIcon.innerHTML = isPlaying ? pausePath : playPath;
      };

      const updateProgress = () => {
        const videoDuration = video.duration || 0;
        const progress = videoDuration ? (video.currentTime / videoDuration) * 100 : 0;

        if (!isSeeking) {
          seekSlider.value = String(progress);
        }

        seekSlider.style.setProperty("--progress", `${progress}%`);
        currentTime.textContent = formatTime(video.currentTime);
        duration.textContent = formatTime(videoDuration);
      };

      const attemptPlay = async () => {
        try {
          await video.play();
          setOverlay(false);
          setLoading(false);
        } catch (error) {
          setOverlay(true);
          setLoading(!hasMetadata);
        }
      };

      const seekBy = (seconds) => {
        if (!hasMetadata) return;
        video.currentTime = Math.min(Math.max(video.currentTime + seconds, 0), video.duration || 0);
        updateProgress();
      };

      const animateTap = (button) => {
        button.classList.add("is-tapping");
        window.setTimeout(() => button.classList.remove("is-tapping"), 170);
      };

      video.addEventListener("loadedmetadata", () => {
        hasMetadata = true;
        setLoading(false);
        updateProgress();
      });

      video.addEventListener("canplay", () => {
        setLoading(false);
      });

      video.addEventListener("waiting", () => {
        if (!video.paused && !video.ended) {
          setLoading(true);
        }
      });

      video.addEventListener("playing", () => {
        setLoading(false);
        setOverlay(false);
        updatePlayButton();
      });

      video.addEventListener("pause", updatePlayButton);
      video.addEventListener("ended", () => {
        updatePlayButton();
        setOverlay(true);
      });

      video.addEventListener("timeupdate", updateProgress);
      video.addEventListener("progress", updateProgress);

      playButton.addEventListener("click", () => {
        animateTap(playButton);
        if (video.paused || video.ended) {
          attemptPlay();
        } else {
          video.pause();
        }
      });

      bigPlayButton.addEventListener("click", () => {
        animateTap(bigPlayButton);
        attemptPlay();
      });

      backButton.addEventListener("click", () => {
        animateTap(backButton);
        seekBy(-10);
      });

      forwardButton.addEventListener("click", () => {
        animateTap(forwardButton);
        seekBy(10);
      });

      seekSlider.addEventListener("input", () => {
        const progress = Number(seekSlider.value);
        seekSlider.style.setProperty("--progress", `${progress}%`);

        if (hasMetadata && Number.isFinite(video.duration)) {
          video.currentTime = (progress / 100) * video.duration;
          currentTime.textContent = formatTime(video.currentTime);
        }
      });

      seekSlider.addEventListener("pointerdown", () => {
        isSeeking = true;
      });

      seekSlider.addEventListener("pointerup", () => {
        isSeeking = false;
        updateProgress();
      });

      seekSlider.addEventListener("change", () => {
        isSeeking = false;
        updateProgress();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          video.pause();
        }
      });

      video.load();
      setLoading(true);
      updatePlayButton();
      updateProgress();

      window.addEventListener("DOMContentLoaded", attemptPlay, { once: true });
    })();
  </script>
</body>
</html>
